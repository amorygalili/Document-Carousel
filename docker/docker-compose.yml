services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

  retrieval-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.retrieval
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  qdrant_data:
